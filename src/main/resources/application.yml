spring:
  application:
    name: AIAgent
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-max
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024 # 维度数，与使用的模型一致
        max-document-batch-size: 10000
    mcp:
      client:
        stdio:
          servers-configuration: classpath:mcp-servers.json
  # datasource:
  #   url: jdbc:mysql://localhost:3306/aiagent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
  #   username: root
  #   password: 123456
  #   driver-class-name: com.mysql.cj.jdbc.Driver
  datasource:
    mysql:
      jdbc-url: jdbc:mysql://localhost:3306/aiagent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      username: root
      password: 123456
      driver-class-name: com.mysql.cj.jdbc.Driver
    postgresql:
      jdbc-url: jdbc:postgresql://rm-cn-sye4pheln0001mzo.rwlb.rds.aliyuncs.com:5432/ai_agent
      username: ai_agent
  profiles:
    active: private
server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi ??????
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.yuanyu.aiagent.controller
knife4j:
  enable: true
  setting:
    language: zh_cn
# logging:
#   level:
#     com.yuanyu.aiagent: debug
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
